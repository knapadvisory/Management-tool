<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TeamHub</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: #1a1d29;
      color: #e6e8ef;
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
    }
    .wrap { max-width: 340px; }
    .logo {
      width: 64px; height: 64px; border-radius: 16px;
      background: #4f46e5; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 700; margin: 0 auto 20px;
    }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { color: #9aa0b4; font-size: 15px; line-height: 1.5; margin: 0 0 24px; }
    button {
      appearance: none; border: 0; cursor: pointer;
      background: #4f46e5; color: #fff;
      font-size: 16px; font-weight: 600;
      padding: 13px 28px; border-radius: 10px; width: 100%;
    }
    button:active { background: #4338ca; }
    small { display: block; margin-top: 18px; color: #6b7186; font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">T</div>
    <h1>Can't reach TeamHub</h1>
    <p>You appear to be offline, or the server isn't responding right now. Check your internet connection and try again.</p>
    <button id="retry" type="button">Try again</button>
    <small>teamhub.knapadvisory.com</small>
  </div>
  <script>
    document.getElementById('retry').addEventListener('click', function () {
      location.href = 'https://teamhub.knapadvisory.com';
    });
  </script>
</body>
</html>
